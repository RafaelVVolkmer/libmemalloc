name: Docker Image CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-docker:
  
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_mode: [Debug, Release]

    runs-on: ${{ matrix.os }}

    concurrency:
      group: docker-build-${{ github.ref }}-${{ matrix.os }}-${{ matrix.build_mode }}
      cancel-in-progress: true

    env:
      BUILD_TYPE: ${{ matrix.build_mode }}
      DOCKER_BUILDKIT: 1
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Log in to Docker Hub (if you need to push)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare build script
        if: runner.os != 'Windows'
        run: chmod +x ./build.sh

      - name: Build image (${{ matrix.build_mode }} on ${{ matrix.os }})
        shell: bash -l {0}
        run: ./build.sh ${{ matrix.build_mode }} --docker

      - name: List built image
        shell: bash -l {0}
        run: docker images libmemalloc:${{ matrix.build_mode }}

      - name: Show binaries
        shell: bash -l {0}
        run: ls -l bin/${{ matrix.build_mode }}

      - name: Show docs
        if: matrix.build_mode == 'Release'
        shell: bash -l {0}
        run: ls docs

      - name: Upload libraries (.so / .a)
        if: success() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: libmemalloc-${{ matrix.os }}-${{ matrix.build_mode }}
          path: bin/${{ matrix.build_mode }}/*.{so,a}

      - name: Upload Doxygen site
        if: success() && matrix.build_mode == 'Release' && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.os }}-release
          path: docs/