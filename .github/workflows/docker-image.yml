name: Docker Image CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-docker:
    runs-on: ubuntu-latest

    env:
      DOCKER_BUILDKIT: 1

    strategy:
      matrix:
        include:
          - mode: Release
            tag: latest
          - mode: Debug
            tag: debug

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build & tag image (${{ matrix.mode }})
        run: |
          docker build \
            --platform linux/amd64 \
            --file Dockerfile \
            --build-arg BUILD_MODE=${{ matrix.mode }} \
            --target runtime \
            -t libmemalloc:${{ matrix.tag }} \
            .

      - name: List local images
        run: docker images libmemalloc:${{ matrix.tag }}

      - name: Export libraries (.so / .a)
        run: |
          rm -rf artifacts/${{ matrix.mode }}
          mkdir -p artifacts/${{ matrix.mode }}
          docker build \
            --platform linux/amd64 \
            --file Dockerfile \
            --build-arg BUILD_MODE=${{ matrix.mode }} \
            --target export \
            --output artifacts/${{ matrix.mode }} \
            .

      - name: Show exported files
        run: ls -l artifacts/${{ matrix.mode }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmemalloc-${{ matrix.mode }}
          path: artifacts/${{ matrix.mode }}/*.so
                artifacts/${{ matrix.mode }}/*.a
